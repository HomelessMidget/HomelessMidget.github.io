<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@XyroHero — Social Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07070f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* Particle canvas */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Central glow */
    .bg-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      width: min(700px, 120vw);
      height: min(700px, 120vw);
      background: radial-gradient(ellipse, rgba(53,155,255,0.15) 0%, rgba(68,21,197,0.1) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: clamp(24px, 5vh, 60px) clamp(16px, 5vw, 40px);
    }

    /* Corner brackets */
    .corner {
      position: fixed;
      width: clamp(28px, 4vw, 48px);
      height: clamp(28px, 4vw, 48px);
      z-index: 2;
    }
    .corner-tl { top: clamp(10px,2vw,20px); left: clamp(10px,2vw,20px); border-top: 2px solid #39ff14; border-left: 2px solid #39ff14; border-radius: 4px 0 0 0; }
    .corner-tr { top: clamp(10px,2vw,20px); right: clamp(10px,2vw,20px); border-top: 2px solid #ff2dcc; border-right: 2px solid #ff2dcc; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: clamp(10px,2vw,20px); left: clamp(10px,2vw,20px); border-bottom: 2px solid #359bff; border-left: 2px solid #359bff; border-radius: 0 0 0 4px; }
    .corner-br { bottom: clamp(10px,2vw,20px); right: clamp(10px,2vw,20px); border-bottom: 2px solid #ff2dcc; border-right: 2px solid #ff2dcc; border-radius: 0 0 4px 0; }

    /* Avatar */
    .avatar-ring {
      width: clamp(80px, 14vw, 120px);
      height: clamp(80px, 14vw, 120px);
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #ff2dcc, #359bff, #39ff14);
      margin-bottom: clamp(12px, 2.5vh, 20px);
      flex-shrink: 0;
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #07070f;
      overflow: hidden;
    }
    .avatar-inner img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* Name */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.3rem, 4.5vw, 2.4rem);
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #ff2dcc 0%, #359bff 50%, #39ff14 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: clamp(4px, 1vh, 8px);
      text-align: center;
    }

    .subtitle {
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      color: rgba(180, 200, 255, 0.5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: clamp(16px, 3.5vh, 32px);
      text-align: center;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(7px, 1.5vw, 12px);
      width: min(500px, 92vw);
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 1vh, 7px);
      padding: clamp(10px, 2vh, 18px) clamp(6px, 1.5vw, 12px);
      background: rgba(10, 10, 30, 0.65);
      border: 1px solid rgba(53, 155, 255, 0.22);
      border-radius: clamp(8px, 1.5vw, 12px);
      color: #c8d8ff;
      text-decoration: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.6rem, 1.8vw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease, background 0.18s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(53,155,255,0.1), rgba(255,45,204,0.1));
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: inherit;
    }

    .btn:hover::before,
    .btn:focus::before { opacity: 1; }

    .btn:hover,
    .btn:focus {
      outline: none;
      border-color: rgba(255, 45, 204, 0.75);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 0 20px rgba(255,45,204,0.28), 0 0 8px rgba(53,155,255,0.18);
    }

    .btn:active { transform: translateY(-1px); }

    .btn i {
      font-size: clamp(16px, 3.5vw, 22px);
    }

    .ico-img {
      width: clamp(16px, 3.5vw, 22px);
      height: clamp(16px, 3.5vw, 22px);
      object-fit: contain;
      filter: brightness(0) invert(0.75) sepia(1) hue-rotate(200deg) saturate(3);
      transition: filter 0.18s;
    }
    .btn:hover .ico-img,
    .btn:focus .ico-img { filter: brightness(0) invert(1); }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 0;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
      .btn:hover { transform: none; }
    }

    /* Very small screens: 2 col */
    @media (max-width: 320px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Landscape phones: tighten vertical */
    @media (max-height: 500px) and (orientation: landscape) {
      .avatar-ring { width: 60px; height: 60px; margin-bottom: 8px; }
      h1 { font-size: 1.1rem; }
      .subtitle { margin-bottom: 10px; }
      .btn { padding: 8px 6px; gap: 3px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="bg-glow"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <main class="page">
    <div class="avatar-ring">
      <div class="avatar-inner">
        <img src="https://r2.fivemanage.com/image/C9pRocl6GFSA.webp" alt="XyroHero profile picture" />
      </div>
    </div>

    <h1>@XyroHero</h1>
    <p class="subtitle">Connect across the internet</p>

    <nav class="grid" aria-label="Social media links">
      <a href="https://x.com/intent/follow?screen_name=homelesmidgets" class="btn">
        <i class="fa-brands fa-x-twitter" aria-hidden="true"></i><span>Twitter</span>
      </a>
      <a href="https://bsky.app/profile/homelesmidgets.bsky.social" class="btn">
        <i class="fa-brands fa-bluesky" aria-hidden="true"></i><span>BlueSky</span>
      </a>
      <a href="https://www.twitch.tv/XyroHero" class="btn">
        <i class="fa-brands fa-twitch" aria-hidden="true"></i><span>Twitch</span>
      </a>
      <a href="https://kick.com/XyroHero" class="btn">
        <img class="ico-img" src="https://r2.fivemanage.com/image/GG4uI0wuIqNL.png" alt="" aria-hidden="true"><span>Kick.com</span>
      </a>
      <a href="https://discord.gg/0cVwnI1a6HEjFQw4" id="discordBtn" class="btn">
        <i class="fa-brands fa-discord" aria-hidden="true"></i><span>Discord</span>
      </a>
      <a href="https://www.youtube.com/@XyroHero" class="btn">
        <i class="fa-brands fa-youtube" aria-hidden="true"></i><span>YouTube</span>
      </a>
      <a href="https://www.tiktok.com/@XyroHeros" class="btn">
        <i class="fa-brands fa-tiktok" aria-hidden="true"></i><span>TikTok</span>
      </a>
      <a href="https://www.xbox.com/play/user/HomelesMijet" class="btn">
        <i class="fa-brands fa-xbox" aria-hidden="true"></i><span>Xbox</span>
      </a>
      <a href="https://streamlabs.com/XyroHeros/tip" class="btn">
        <img class="ico-img" src="https://r2.fivemanage.com/image/JasT9p8BXhEA.png" alt="" aria-hidden="true"><span>Tip</span>
      </a>
    </nav>
  </main>

  <script>
    // Floating particles
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    const count = isMobile ? 18 : 35;

    const colors = ['rgba(53,155,255,', 'rgba(255,45,204,', 'rgba(57,255,20,', 'rgba(68,21,197,'];

    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * (isMobile ? 4 : 6) + 2,
        dx: (Math.random() - 0.5) * 0.4,
        dy: -(Math.random() * 0.5 + 0.2),
        alpha: Math.random() * 0.45 + 0.1,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function animate() {
      if (prefersReducedMotion) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + p.alpha + ')';
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
        if (p.x < -10) p.x = canvas.width + 10;
        if (p.x > canvas.width + 10) p.x = -10;
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Discord live invite
    fetch('https://discord.com/api/guilds/111213375727370240/widget.json')
      .then(r => r.json())
      .then(d => { if (d && d.instant_invite) document.getElementById('discordBtn').href = d.instant_invite; })
      .catch(() => {});
  </script>
</body>
</html>
